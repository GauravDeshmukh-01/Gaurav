<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Beautiful Universe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bgMove 20s ease infinite;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{

width:900px;
padding:60px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(0,0,0,0.5);
text-align:center;
animation:fade 2s ease;
}

@keyframes fade{

from{opacity:0; transform:translateY(50px)}
to{opacity:1; transform:translateY(0)}

}

h1{

font-size:60px;
letter-spacing:3px;
margin-bottom:20px;
background:linear-gradient(90deg,#00dbde,#fc00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

p{

font-size:20px;
margin-bottom:40px;
opacity:0.9;

}

.btn{

padding:18px 45px;
border-radius:50px;
border:none;
font-size:20px;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#ff00cc,#3333ff);
transition:0.4s;
box-shadow:0 0 15px #ff00cc;

}

.btn:hover{

transform:scale(1.1);
box-shadow:0 0 30px #ff00cc,0 0 60px #3333ff;

}

.stars span{

position:absolute;
top:50%;
left:50%;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:float 10s linear infinite;

}

@keyframes float{

0%{transform:translateY(0px)}
100%{transform:translateY(-1000px)}

}

.footer{

margin-top:40px;
opacity:0.7;
font-size:14px;

}

</style>

</head>

<body>

<div class="stars">

<span style="left:10%;animation-duration:8s"></span>
<span style="left:20%;animation-duration:12s"></span>
<span style="left:35%;animation-duration:7s"></span>
<span style="left:50%;animation-duration:10s"></span>
<span style="left:65%;animation-duration:6s"></span>
<span style="left:80%;animation-duration:9s"></span>

</div>

<div class="container">

<h1>Dream Web</h1>

<p>
Experience a futuristic web design with glowing UI,
glassmorphism effects and smooth animations.
Modern websites use creative design to make users feel
like they are inside a digital universe.
</p>

<button class="btn" onclick="show()">Explore</button>

<div class="footer">
Made with ❤️ using HTML, CSS & JavaScript
</div>

</div>

<script>

function show(){

alert("Welcome to the Beautiful Web Universe 🚀")

}

</script>

</body>
</html>
